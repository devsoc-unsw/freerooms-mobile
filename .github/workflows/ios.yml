name: iOS CI

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'ios/**'
      - '.github/workflows/ios.yml'

env:
  DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

permissions:
  contents: read

defaults:
  run:
    working-directory: ios

jobs:
  formatter:
    name: Formatter
    runs-on: macos-26
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
    - name: Run formatter check
      run: swiftformat --lint .
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
    - name: GitHub Action for SwiftLint
      uses: norio-nomura/action-swiftlint@9f4dcd7fd46b4e75d7935cf2f4df406d5cae3684
      env:
        WORKING_DIRECTORY: ios
      with:
        args: --strict --config .swiftlint.yml
  tests:
    name: Tests
    runs-on: macos-26
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
    - name: Run tests
      run: "xcodebuild test -skipMacroValidation -scheme Tests -destination 'platform=iOS Simulator,name=iPhone 17'"
  build:
    name: Build
    runs-on: macos-26
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
    - name: Build swift project
      run: "xcodebuild build -skipMacroValidation -scheme Freerooms -destination 'platform=iOS Simulator,name=iPhone 17'"
